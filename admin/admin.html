<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eli Nail's | Panel de Administradora</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/png" href="../img/logo.png">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<header class="admin-topbar">
  <div class="admin-brand">
    <img src="../img/logo.png" alt="Eli Nail's" onerror="this.style.display='none'">
    <span>Eli Nail's <em>· Admin</em></span>
  </div>
  <div class="admin-topbar-actions">
    <a href="../index.html" target="_blank" class="btn btn-outline btn-sm">
      <i class="fa-solid fa-arrow-up-right-from-square"></i> Ver sitio
    </a>
    <button id="btnLogout" class="btn btn-outline btn-sm">
      <i class="fa-solid fa-right-from-bracket"></i> Salir
    </button>
  </div>
</header>

<main class="admin-main">
  <section class="admin-stats" id="adminStats">
    <div class="stat-card glass">
      <span class="stat-num" id="statTotal">0</span>
      <span class="stat-label"><i class="fa-solid fa-users"></i> Participantes</span>
    </div>
    <div class="stat-card glass">
      <span class="stat-num" id="statConfirmados">0</span>
      <span class="stat-label"><i class="fa-solid fa-circle-check"></i> Pagos confirmados</span>
    </div>
    <div class="stat-card glass">
      <span class="stat-num" id="statPendientes">0</span>
      <span class="stat-label"><i class="fa-solid fa-clock"></i> Pagos pendientes</span>
    </div>
    <div class="stat-card glass">
      <span class="stat-num" id="statDisponibles">0</span>
      <span class="stat-label"><i class="fa-solid fa-hashtag"></i> Números disponibles</span>
    </div>
  </section>

  <section class="admin-panel glass">
    <h2><i class="fa-solid fa-sliders"></i> Configuración del sorteo</h2>
    <div class="admin-config-grid">
      <form id="formPremio" class="admin-form">
        <label>Nombre del premio</label>
        <input type="text" id="inputPremioNombre">
        <label>Valor del premio (S/)</label>
        <input type="number" id="inputPremioValor" min="0" step="0.01">
        <label>Precio del ticket (S/)</label>
        <input type="number" id="inputTicketPrecio" min="0" step="0.01">
        <label>Cantidad de números del sorteo</label>
        <input type="number" id="inputTotalNumeros" min="1" max="100">
        <button type="submit" class="btn btn-primary btn-sm">
          <i class="fa-solid fa-floppy-disk"></i> Guardar cambios
        </button>
        <p class="admin-msg" id="premioMsg"></p>
      </form>
      <div class="admin-uploads">
        <div class="upload-block">
          <label><i class="fa-solid fa-image"></i> Foto del premio</label>
          <input type="file" id="inputFotoPremio" accept="image/*">
        </div>
        <div class="upload-block">
          <label><i class="fa-solid fa-qrcode"></i> QR de Yape</label>
          <input type="file" id="inputQR" accept="image/*">
        </div>
      </div>
    </div>
  </section>

  <section class="admin-panel glass">
    <div class="admin-panel-header">
      <h2><i class="fa-solid fa-list-check"></i> Participantes</h2>
      <button id="btnExportar" class="btn btn-outline btn-sm">
        <i class="fa-solid fa-file-excel"></i> Exportar a Excel
      </button>
    </div>
    <div class="table-wrap">
      <table class="admin-table" id="tablaParticipantes">
        <thead>
          <tr>
            <th>#</th><th>Nombre</th><th>WhatsApp</th><th>Comprobante</th><th>Estado</th><th>Fecha</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaParticipantesBody"></tbody>
      </table>
      <p class="admin-empty" id="tablaVacia" style="display:none;">Aún no hay participantes registradas.</p>
    </div>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// BLOQUEO DE SEGURIDAD
if(localStorage.getItem('adminLogin') !== 'true'){
  window.location.href = 'login.html';
}

document.getElementById('btnLogout').onclick = () => {
  localStorage.removeItem('adminLogin');
  window.location.href = 'login.html';
}

// AQUI VA TODO TU CODIGO DE admin.js PERO CON localStorage
// Por ahora te dejo ejemplo basico
let participantes = JSON.parse(localStorage.getItem('participantes')) || [];
let config = JSON.parse(localStorage.getItem('configSorteo')) || {
  premio: "Manicura Acrílica",
  valor: 150,
  precio: 10,
  total: 50
};

// Cargar config
document.getElementById('inputPremioNombre').value = config.premio;
document.getElementById('inputPremioValor').value = config.valor;
document.getElementById('inputTicketPrecio').value = config.precio;
document.getElementById('inputTotalNumeros').value = config.total;

// Guardar config
document.getElementById('formPremio').onsubmit = e => {
  e.preventDefault();
  config.premio = document.getElementById('inputPremioNombre').value;
  config.valor = document.getElementById('inputPremioValor').value;
  config.precio = document.getElementById('inputTicketPrecio').value;
  config.total = document.getElementById('inputTotalNumeros').value;
  localStorage.setItem('configSorteo', JSON.stringify(config));
  document.getElementById('premioMsg').textContent = 'Guardado!';
  setTimeout(()=>premioMsg.textContent='',2000);
}

// Exportar Excel
document.getElementById('btnExportar').onclick = () => {
  const ws = XLSX.utils.json_to_sheet(participantes);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Participantes");
  XLSX.writeFile(wb, "participantes.xlsx");
}
</script>
</body>
</html>
