<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Login Admin</title>
<link rel="stylesheet" href="admin.css"></head>
<body class="login-body">
<div class="login-card">
<h2>Eli Nail's Admin</h2>
<form id="f">
<input type="email" id="email" placeholder="admin@elinails.com" required>
<input type="password" id="pass" placeholder="elinails2025" required>
<button>Ingresar</button><p id="m" style="color:red"></p>
</form></div>
<script>
document.getElementById('f').onsubmit = e => {
e.preventDefault();
if(email.value==='admin@elinails.com' && pass.value==='elinails2025'){
localStorage.setItem('adminLogin','true'); location.href='admin.html';
}else{m.textContent='Clave incorrecta'}}
</script>
</body></html>
