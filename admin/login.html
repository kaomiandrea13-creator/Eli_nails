<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eli Nail's | Acceso Administradora</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600,0,700;1,600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/png" href="../img/logo.png">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="login-body">

  <div class="login-card glass">
    <div class="login-brand">
      <img src="../img/logo.png" alt="Eli Nail's" onerror="this.style.display='none'">
      <span>Eli Nail's</span>
    </div>
    <p class="login-sub">Panel de administradora</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="password"><i class="fa-solid fa-lock"></i> Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="btnLogin">
        Ingresar <i class="fa-solid fa-arrow-right-to-bracket"></i>
      </button>
      <p class="login-msg" id="loginMsg"></p>
    </form>

    <a href="../index.html" class="login-back"><i class="fa-solid fa-arrow-left"></i> Volver al sitio</a>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
